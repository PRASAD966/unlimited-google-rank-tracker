<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Lexend Font -->
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Lexend', sans-serif;
        }

        body {
            height: 100vh;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Overlay */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        /* Modal Box */
        .modal-box {
            width: 420px;
            background: #ffffff;
            padding: 28px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .modal-box h2 {
            font-size: 20px;
            font-weight: 600;
            color: #1E1E1E;
            margin-bottom: 8px;
        }

        .modal-box p {
            font-size: 14px;
            font-weight: 500;
            color: #686868;
            margin-bottom: 22px;
            line-height: 1.4;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        /* Buttons */
        .btn {
            padding: 10px 22px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
        }

        .btn-cancel {
            background: #ffffff;
            border: 1px solid #D1D5DB;
            color: #1E1E1E;
        }

        .btn-cancel:hover {
            background: #f2f2f2;
        }

        .btn-delete {
            background: #DC2626;
            color: #ffffff;
        }

        .btn-delete:hover {
            background: #B91C1C;
        }

        .btn-ok {
            background: #0D9488;
            color: #ffffff;
        }

        .btn-ok:hover {
            background: #0F766E;
        }
    </style>
</head>

<body>

<!-- DELETE CONFIRMATION MODAL -->
<div id="deleteModal" class="modal-overlay">
    <div class="modal-box">
        <h2>Delete Account</h2>
        <p>
            Are you sure you want to delete your account?  
            This action cannot be undone.
        </p>

        <div class="modal-actions">
            <button class="btn btn-cancel" onclick="closeDelete()">Cancel</button>
            <button class="btn btn-delete" onclick="confirmDelete()">Delete</button>
        </div>
    </div>
</div>

<!-- SUCCESS MODAL -->
<div id="successModal" class="modal-overlay">
    <div class="modal-box">
        <h2>Account Deleted</h2>
        <p>Your account has been deleted successfully.</p>

        <div class="modal-actions">
            <button class="btn btn-ok" onclick="closeSuccess()">OK</button>
        </div>
    </div>
</div>

<script>
    function openDelete() {
        document.getElementById("deleteModal").style.display = "flex";
    }

    function closeDelete() {
        document.getElementById("deleteModal").style.display = "none";
    }

    function confirmDelete() {
        // Close delete popup
        closeDelete();

        // Show success popup
        document.getElementById("successModal").style.display = "flex";

        // Backend call goes here (Flask)
        // fetch('/delete-account', { method: 'POST' })
    }

    function closeSuccess() {
        document.getElementById("successModal").style.display = "none";

        // Optional redirect
        // window.location.href = "/login";
    }

    // Auto-open delete popup for testing
    window.onload = function () {
        openDelete();
    };
</script>

</body>
</html>
