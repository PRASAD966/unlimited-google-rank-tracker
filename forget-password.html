<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Rankplex</title>
   <meta name="robots" content="noindex,nofollow">
   <link rel="icon" type="image/svg+xml" href="./images/nice-logo.svg">
   <link rel="stylesheet" href="./css/owl.carousel.min.css">
   <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;500;600&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="./css/style.css">
</head>

<body>

   <div class="sign-in-form">
      <div class="sign-in-blk">
         <div class="form-logo">
            <img src="./images/nice-logo.svg" alt="Logo">
         </div>
         <div class="sub-heading">Forgot your password</div>
         <p class="frm-text">Don’t worry! Enter your registered email address, and we’ll send you a link to reset your
            password.</p>
         <form method="post" action="/forgot-password">
            <div class="email-field">
               <label>Email Address</label>
               <input type="email" name="email" placeholder="Enter your email address" required>
            </div>
            <div class="sumbit-field">
               <input type="submit" value="Send Reset Link">
            </div>

            <div class="sign-up-link">
               <p>Remember your password</p>
               <a href="/login">Sign in</a>
            </div>
         </form>
      </div>
   </div>
   <!-- Error Modal -->
   <div id="errorModal" class="modal"
      style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.4);">
      <div class="modal-content"
         style="background-color: #fefefe; margin: 15% auto; padding: 20px; border: 1px solid #888; width: 80%; max-width: 400px; border-radius: 8px; text-align: center;">
         <p id="modalErrorMessage" style="color: red; font-size: 16px; margin-bottom: 20px;">
            {{ error }}
         </p>
         <button onclick="document.getElementById('errorModal').style.display='none'"
            style="cursor: pointer; padding: 10px 20px; border: none; background-color: #007f5f; color: #fff; border-radius: 5px;">OK</button>
      </div>
   </div>

   <script src="./js/jquery.min.js"></script>
   <script src="./js/owl.carousel.min.js"></script>
   <script src="./js/common.js"></script>
   <script>
      document.addEventListener('DOMContentLoaded', function () {
         // Check for server-side error
         const serverError = "{{ error }}";
         if (serverError && serverError !== "{" + "{ error }" + "}" && serverError !== "{" + "{ error if error else '' }" + "}") {
            document.getElementById('errorModal').style.display = 'block';
            if (serverError.toLowerCase().includes("sent") || serverError.toLowerCase().includes("success")) {
               document.getElementById('modalErrorMessage').style.color = "green";
            }
         }
      });
   </script>
</body>

</html>
