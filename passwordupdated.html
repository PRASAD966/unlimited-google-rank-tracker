<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Password Updated</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Lexend Deca -->
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Lexend Deca", sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f6f8;
        }

        /* Overlay */
        .status-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        /* Modal Box */
        .status-modal {
            background: #ffffff;
            width: 420px;
            padding: 28px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        /* Title */
        .status-modal h2 {
            font-size: 20px;
            font-weight: 600;
            color: #1E1E1E;
            margin-bottom: 8px;
        }

        /* Subtitle */
        .status-modal p {
            font-size: 14px;
            font-weight: 500;
            color: #686868;
            margin-bottom: 22px;
        }

        /* Button Row */
        .status-actions {
            display: flex;
            justify-content: flex-end;
        }

        /* Done Button */
        .btn-done {
            padding: 10px 26px;
            border-radius: 10px;
            border: none;
            background: #0D9488;
            /* NICE DIGITALS GREEN */
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-done:hover {
            background: #0F766E;
        }
    </style>
</head>

<body>

    <!-- Password Updated Modal -->
    <div id="passwordModal" class="status-overlay">
        <div class="status-modal">
            <h2>Password Updated</h2>
            <p>Your password has been changed successfully.</p>

            <div class="status-actions">
                <button class="btn-done" onclick="closePasswordModal()">Done</button>
            </div>
        </div>
    </div>

    <script>
        function openPasswordModal() {
            document.getElementById("passwordModal").style.display = "flex";
        }

        function closePasswordModal() {
            document.getElementById("passwordModal").style.display = "none";
            window.location.href = "/settings";
        }

        // Auto-open (same behavior as logout modal)
        window.onload = function () {
            openPasswordModal();
        };
    </script>

</body>

</html>
