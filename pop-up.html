<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rankplex</title>
    <meta name="robots" content="noindex,nofollow">
    <link rel="icon" type="image/svg+xml" href="./images/nice-logo.svg">
    <link rel="stylesheet" href="./css/owl.carousel.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <div class="rank-check-pop-up-blk">
        <div class="pop-up-heading">
            Rank Check Completed
        </div>
        <div class="checked-img">
            <img src="./images/checked-img.svg" alt="check" height="64" width="64">
        </div>
        <div class="para">
            Your keyword check is complete. Review the summary below and download the reports.
        </div>
        <div class="project-details">
            <div class="project">
                <div class="projct-title">
                    Domain
                </div>
                <div class="project-description">
                    www.example.com
                </div>
            </div>
            <div class="project">
                <div class="projct-title">
                    Project:
                </div>
                <div class="project-description">
                    Project Name Here
                </div>
            </div>
        </div>
        <div class="pop-up-btns" style="display: flex; gap: 15px; justify-content: center;">
            <div class="report-btn">
                <a href="#" class="btn"
                    style="width: 156px; height: 36px; display: inline-flex; justify-content: center; align-items: center; padding: 0; font-family: 'Lexend Deca', sans-serif; font-size: 13px; font-weight: 500; line-height: 20px; border-radius: 8px; text-decoration: none;">View
                    Report</a>
            </div>
            <div class="down-btn">
                <a href="#" class="cmn-btn"
                    style="width: 156px; height: 36px; display: inline-flex; justify-content: center; align-items: center; padding: 0; font-family: 'Lexend Deca', sans-serif; font-size: 13px; font-weight: 500; line-height: 20px; border-radius: 8px; text-decoration: none;">Download
                    Full Report</a>
            </div>
        </div>
    </div>

    <div class="project-pop-up">
        <div class="pop-up-heading">
            Create New Project
        </div>
        <div class="project-feild">
            <label for="Project Name">Project Name</label>
            <input type="text" value="Enter project name">
        </div>
        <div class="project-feild">
            <label for="Url">Url</label>
            <input type="text" value="Enter websites url">
        </div>
        <div class="project-btm-btns" style="display: flex; gap: 15px; justify-content: center;">
            <div class="cancel-btn">
                <a href="#" class="btn"
                    style="width: 156px; height: 36px; display: inline-flex; justify-content: center; align-items: center; padding: 0; font-family: 'Lexend Deca', sans-serif; font-size: 13px; font-weight: 500; line-height: 20px; border-radius: 8px; text-decoration: none;">Cancel</a>
            </div>
            <div class="save-btn">
                <a href="#" class="cmn-btn"
                    style="width: 156px; height: 36px; display: inline-flex; justify-content: center; align-items: center; padding: 0; font-family: 'Lexend Deca', sans-serif; font-size: 13px; font-weight: 500; line-height: 20px; border-radius: 8px; text-decoration: none;">Save
                    Project</a>
            </div>
        </div>
    </div>

    <div class="project-pop-up">
        <div class="pop-up-heading">
            Edit Project
        </div>
        <div class="project-feild">
            <label for="Project Name">Project Name</label>
            <input type="text" value="Enter project name">
        </div>
        <div class="project-feild">
            <label for="Url">Url</label>
            <input type="text" value="Enter websites url">
        </div>
        <div class="project-btm-btns edit" style="display: flex; gap: 15px; justify-content: center;">
            <div class="cancel-btn">
                <a href="#" class="btn"
                    style="width: 156px; height: 36px; display: inline-flex; justify-content: center; align-items: center; padding: 0; font-family: 'Lexend Deca', sans-serif; font-size: 13px; font-weight: 500; line-height: 20px; border-radius: 8px; text-decoration: none;">Cancel</a>
            </div>
            <div class="save-btn">
                <a href="#" class="cmn-btn"
                    style="width: 156px; height: 36px; display: inline-flex; justify-content: center; align-items: center; padding: 0; font-family: 'Lexend Deca', sans-serif; font-size: 13px; font-weight: 500; line-height: 20px; border-radius: 8px; text-decoration: none;">Update
                    changes</a>
            </div>
        </div>
    </div>
    <div class="nav-links"
        style="display: flex; justify-content: center; gap: 10px; align-items: center; margin-top: 20px;">
        <a class="prev page-numbers" href="#"
            style="width: 156px; height: 36px; display: inline-flex; justify-content: center; align-items: center; padding: 0; border: 1px solid #ddd; border-radius: 8px; color: #333; text-decoration: none; font-family: 'Lexend Deca', sans-serif; font-size: 13px; font-weight: 500; line-height: 20px;">&laquo;
            Prev</a>
        <a class="page-numbers" href="#">1</a>
        <a class="page-numbers" href="#">2</a>
        <a class="page-numbers" href="#">3</a>
        <a class="page-numbers" href="#">4</a>
        <a class="page-numbers" href="#">5</a>
        <a class="next page-numbers" href="#"
            style="width: 156px; height: 36px; display: inline-flex; justify-content: center; align-items: center; padding: 0; border: 1px solid #ddd; border-radius: 8px; color: #333; text-decoration: none; font-family: 'Lexend Deca', sans-serif; font-size: 13px; font-weight: 500; line-height: 20px;">Next
            &raquo;</a>
    </div>

    <script src="./js/jquery.min.js"></script>
    <script src="./js/owl.carousel.min.js"></script>
    <script src="./js/common.js"></script>
</body>

</html>
